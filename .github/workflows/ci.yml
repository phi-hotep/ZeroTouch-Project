name: ZeroTouch CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:   # adds a "Run workflow" button for manual redeploys

jobs:
  flutter:
    name: Flutter — analyze & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter-intake
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  powershell:
    name: PowerShell — PSScriptAnalyzer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module PSScriptAnalyzer -Force -Scope CurrentUser
      - name: Analyze engine + function
        shell: pwsh
        run: |
          # Excluded rules are intentional, documented design choices, not defects:
          #   PSAvoidUsingWriteHost                          engine logs to the host (colored console, captured by App Insights)
          #   PSUseShouldProcessForStateChangingFunctions    ShouldProcess is implemented where it matters; the router forwards -WhatIf/-Confirm explicitly
          #   PSAvoidUsingConvertToSecureStringWithPlainText Get-ZtSecret must turn a plaintext env-var / Azure App Setting into a SecureString for Graph
          #   PSAvoidUsingUsernameAndPasswordParams          Send-ZtWelcomeEmail emails a temp password by design (portfolio demo; see README security notes)
          $issues = Invoke-ScriptAnalyzer -Path . -Recurse -Severity Error,Warning `
            -ExcludeRule PSAvoidUsingWriteHost,PSUseShouldProcessForStateChangingFunctions,PSAvoidUsingConvertToSecureStringWithPlainText,PSAvoidUsingUsernameAndPasswordParams
          $issues | Format-Table -AutoSize
          if ($issues.Where({ $_.Severity -eq 'Error' })) {
            Write-Error "PSScriptAnalyzer found errors."
            exit 1
          }

  deploy-web:
    name: Deploy web → Cloudflare Pages
    needs: flutter                              # only ship if the web tests pass
    if: github.event_name != 'pull_request'     # deploy on push-to-master + manual, never on PRs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Build web (dart-define flags baked in from secrets)
        working-directory: flutter-intake
        run: |
          flutter pub get
          flutter build web --release \
            --dart-define=FUNCTION_URL=${{ secrets.FUNCTION_URL }} \
            --dart-define=FUNCTION_KEY=${{ secrets.FUNCTION_KEY }}
      - name: Verify Function URL is baked in (guard against a dropped flag)
        run: grep -q "azurewebsites.net" flutter-intake/build/web/main.dart.js
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy flutter-intake/build/web --project-name=zerotouch --branch=master
